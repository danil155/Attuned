services:
  db:
    image: pgvector/pgvector:pg17
    container_name: attuned_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - attuned_network

  backend:
    build: ./backend
    container_name: attuned_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET}
      STEAM_API_KEY: ${STEAM_API_KEY}
    volumes:
      - model_cache:/cache/huggingface
    networks:
      - attuned_network
    ports:
      - "127.0.0.1:8000:8000"

  frontend:
    build: ./frontend
    container_name: attuned_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - attuned_network
    ports:
      - "127.0.0.1:3000:3000"

  pgadmin:
    image: dpage/pgadmin4
    container_name: attuned_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: ${PGA_PASSWORD}
    ports:
      - "127.0.0.1:5050:80"
    depends_on:
      - db
    networks:
      - attuned_network
    logging:
      driver: "none"

networks:
  attuned_network:
    driver: bridge

volumes:
  postgres_data:
  model_cache: